name: Generate weekly calendar views

on:
  push:
    branches: [main]
    paths:
      - daycare_log.csv
      - scripts/generate_weekly_calendar.py
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-calendar
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install matplotlib

      - name: Generate weekly calendar PNGs
        run: python scripts/generate_weekly_calendar.py

      - name: Commit updated calendars
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weekly_views/
          if git diff --cached --quiet; then
            echo "No calendar changes to commit."
            exit 0
          fi
          git commit -m "Update weekly calendar views"
          # main may have moved while we ran (the daily log pushes several
          # commits in quick succession), so rebase and retry the push.
          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt), rebasing onto latest main..."
            git pull --rebase origin main
          done
          echo "Failed to push after 5 attempts." >&2
          exit 1
