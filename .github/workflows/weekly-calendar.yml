name: Generate weekly calendar views

on:
  push:
    branches: [main]
    paths:
      - daycare_log.csv
      - scripts/generate_weekly_calendar.py
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-calendar
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install matplotlib

      - name: Generate weekly calendar PNGs
        run: python scripts/generate_weekly_calendar.py

      - name: Commit updated calendars
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weekly_views/
          if git diff --cached --quiet; then
            echo "No calendar changes to commit."
          else
            git commit -m "Update weekly calendar views"
            git push
          fi
